# Optional Docker daemon configuration. The variable can be either file path or the Docker Daemon json content itself
docker_daemon_config_src: ""

# Optional Docker daemon configuration file path on remote hosts
docker_daemon_config_dst: "/etc/docker/daemon.json"
# Source of the MKE config file. Config example ref: https://docs.mirantis.com/mke/3.7/ops/administer-cluster/configure-an-mke-cluster/use-an-mke-configuration-file.html
mke_config_src: ""

# THE MCR license value
mcr_license: ""

# The MKE license value
mke_license: ""

# MKE Installation flags
# https://docs.mirantis.com/mke/3.7/cli-ref/mke-cli-install.html
mke_install_flags:
  [
    '--san="{{ mke_url }}"',
    '--default-node-orchestrator="kubernetes"',
    '--nodeport-range="32768-35535"',
    "--force-minimums",
  ]

# The appointed manager node used as a lead node
main_manager: "{{ groups['managers'][0] }}"


# When true, sshd is stopped and disabled on every host at the end of the operation.
# Set to true only in environments where SSH access must be revoked post-install.
disable_sshd_after_install: true

# When true, firewalld is stopped and disabled on every host instead of opening
# individual ports. Use in environments where the network perimeter is managed
# externally and a host-level firewall adds no value or causes interference.
# When false (default), the standard per-service port rules are applied via firewalld.
disable_firewalld: false

# When true, the System Upgrade Controller (SUC) is deployed to the cluster
# before mke-upgrade-controller. Required when spec.os or spec.product.type=mke4
# is used in a ClusterUpgrade CR.
# Ref: https://github.com/rancher/system-upgrade-controller
deploy_suc: true

# Service account granted the 'privileged' pod-security attribute in the MKE
# UCPAuthorization allowlist when deploy_suc is true. Format: namespace:name.
suc_service_account: "system-upgrade:system-upgrade"


# When true, the mke-upgrade-controller is installed on the cluster.
deploy_mke_upgrade_controller: true

# mke-upgrade-controller Helm chart coordinates.
mke_upgrade_controller_release_name: "mke-upgrade-controller"
mke_upgrade_controller_chart: "oci://registry.ci.mirantis.com/bootc-mirantis/charts/mke-upgrade-controller"
mke_upgrade_controller_version: "0.1.0"
mke_upgrade_controller_namespace: "mke"
